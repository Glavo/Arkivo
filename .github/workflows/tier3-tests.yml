name: Tier 3 tests

on:
  workflow_dispatch:
  schedule:
    - cron: "47 4 1 * *"

permissions:
  contents: read

concurrency:
  group: tier3-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Scalability and constrained-resource tests
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run Tier 3 tests
        run: ./gradlew -g .gradle-user-home tier3Test --no-daemon --stacktrace
